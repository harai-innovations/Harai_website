<svg viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Non-invasive electrolyte monitoring band with report">
<defs>
  <linearGradient id="ebg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#EEF5F4"/></linearGradient>
  <linearGradient id="eband" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2c3641"/><stop offset="1" stop-color="#141a22"/></linearGradient>
  <linearGradient id="escreen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07313a"/><stop offset="1" stop-color="#0b1620"/></linearGradient>
  <filter id="eds" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0d2a38" flood-opacity="0.18"/></filter>
  <filter id="eds2" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0d2a38" flood-opacity="0.16"/></filter>
</defs>
<rect width="880" height="560" fill="url(#ebg)"/>
<text x="40" y="58" font-family="monospace" font-size="14" fill="#0E8FA6" letter-spacing="2">NON-INVASIVE · NO BLOOD DRAW</text>
<!-- band device (left) -->
<g transform="rotate(-12 250 300)" filter="url(#eds)">
  <rect x="150" y="120" width="200" height="360" rx="56" fill="none" stroke="#2a333d" stroke-width="20" stroke-opacity="0.22"/>
  <rect x="172" y="178" width="156" height="244" rx="36" fill="url(#eband)"/>
  <rect x="190" y="200" width="120" height="200" rx="22" fill="url(#escreen)" stroke="#17A673" stroke-opacity="0.4"/>
  <text x="206" y="238" font-family="monospace" font-size="22" fill="#fff">Na⁺</text>
  <text x="206" y="262" font-family="monospace" font-size="20" fill="#3DE0B0">138</text>
  <text x="206" y="300" font-family="monospace" font-size="15" fill="#bfe6df">K⁺ 4.2</text>
  <text x="206" y="326" font-family="monospace" font-size="15" fill="#bfe6df">Cl⁻ 102</text>
  <text x="206" y="352" font-family="monospace" font-size="15" fill="#bfe6df">Ca²⁺ 9.4</text>
  <circle cx="250" cy="448" r="8" fill="#13A39A" opacity="0.3"/><circle cx="250" cy="448" r="4" fill="#22D38B"/>
</g>
<!-- report card (right) -->
<g transform="translate(470 96)" filter="url(#eds2)">
  <rect width="350" height="400" rx="18" fill="#fff"/>
  <text x="26" y="44" font-family="sans-serif" font-size="17" font-weight="600" fill="#15232C">Electrolyte Report</text>
  <text x="26" y="66" font-family="monospace" font-size="12" fill="#8b97a0">Today · 10:30 AM</text>
  <line x1="26" y1="82" x2="324" y2="82" stroke="#E2E9EC"/>
  <!-- rows -->
  <g font-family="sans-serif" font-size="14">
    <text x="26" y="120" fill="#3a4750">Sodium (Na⁺)</text><text x="324" y="120" text-anchor="end" fill="#17A673" font-family="monospace">138 mEq/L</text>
    <rect x="26" y="130" width="298" height="6" rx="3" fill="#EDF3F2"/><rect x="120" y="130" width="120" height="6" rx="3" fill="#17A673"/>
    <text x="26" y="178" fill="#3a4750">Potassium (K⁺)</text><text x="324" y="178" text-anchor="end" fill="#17A673" font-family="monospace">4.2 mEq/L</text>
    <rect x="26" y="188" width="298" height="6" rx="3" fill="#EDF3F2"/><rect x="110" y="188" width="100" height="6" rx="3" fill="#17A673"/>
    <text x="26" y="236" fill="#3a4750">Chloride (Cl⁻)</text><text x="324" y="236" text-anchor="end" fill="#17A673" font-family="monospace">102 mEq/L</text>
    <rect x="26" y="246" width="298" height="6" rx="3" fill="#EDF3F2"/><rect x="130" y="246" width="110" height="6" rx="3" fill="#17A673"/>
    <text x="26" y="294" fill="#3a4750">Calcium (Ca²⁺)</text><text x="324" y="294" text-anchor="end" fill="#17A673" font-family="monospace">9.4 mg/dL</text>
    <rect x="26" y="304" width="298" height="6" rx="3" fill="#EDF3F2"/><rect x="118" y="304" width="104" height="6" rx="3" fill="#17A673"/>
  </g>
  <line x1="26" y1="334" x2="324" y2="334" stroke="#E2E9EC"/>
  <circle cx="36" cy="364" r="11" fill="#17A673"/><path d="M31 364 l4 4 l7 -9" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="56" y="369" font-family="sans-serif" font-size="14" fill="#15232C">All values within normal range</text>
</g>
</svg>
