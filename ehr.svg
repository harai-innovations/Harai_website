<svg viewBox="0 0 880 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HARAI EHR dashboard">
<rect width="880" height="560" fill="#EEF3F4"/>
<!-- window -->
<rect x="24" y="24" width="832" height="512" rx="14" fill="#fff"/>
<!-- top bar (navy) -->
<rect x="24" y="24" width="832" height="52" rx="14" fill="#0D2A38"/>
<rect x="24" y="52" width="832" height="24" fill="#0D2A38"/>
<g transform="translate(46 38)">
  <rect x="0" y="6" width="9" height="9" rx="2.5" fill="#1BB07A"/><rect x="9" y="15" width="9" height="9" rx="2.5" fill="#13A39A"/><rect x="0" y="24" width="9" height="9" rx="2.5" fill="#1BB07A"/><rect x="-9" y="15" width="9" height="9" rx="2.5" fill="#13A39A"/><rect x="0" y="15" width="9" height="9" rx="2.5" fill="#17A673"/>
</g>
<text x="74" y="56" font-family="sans-serif" font-size="15" font-weight="700" fill="#fff">HARAI <tspan fill="#9fb4bd" font-weight="400">INNOVATION</tspan></text>
<text x="245" y="56" font-family="sans-serif" font-size="13" fill="#7f97a1">EHR System</text>
<rect x="560" y="38" width="200" height="24" rx="12" fill="#16384a"/>
<circle cx="828" cy="50" r="13" fill="#16384a"/>
<!-- sidebar -->
<rect x="24" y="76" width="180" height="460" fill="#F6F9FA"/>
<g font-family="sans-serif" font-size="13" fill="#5C6B76">
  <rect x="40" y="92" width="148" height="30" rx="8" fill="#E6F4EF"/><text x="56" y="112" fill="#17A673" font-weight="600">Dashboard</text>
  <text x="56" y="150">Patients</text><text x="56" y="184">Appointments</text><text x="56" y="218">Encounters</text>
  <text x="56" y="252">Prescriptions</text><text x="56" y="286">Lab Results</text><text x="56" y="320">Imaging</text>
  <text x="56" y="354">Documents</text><text x="56" y="388">Billing</text><text x="56" y="422">Reports</text><text x="56" y="456">Analytics</text>
</g>
<!-- content -->
<text x="226" y="108" font-family="sans-serif" font-size="18" font-weight="600" fill="#15232C">Welcome, Dr. Sidharth</text>
<text x="226" y="130" font-family="sans-serif" font-size="13" fill="#8b97a0">Good morning!</text>
<!-- patient card -->
<rect x="226" y="146" width="290" height="150" rx="10" fill="#fff" stroke="#E2E9EC"/>
<circle cx="266" cy="196" r="24" fill="#dfeaee"/><circle cx="266" cy="188" r="9" fill="#9fb1bb"/><path d="M250 214 q16 -16 32 0" fill="#9fb1bb"/>
<g font-family="sans-serif" font-size="12">
  <text x="306" y="180" fill="#8b97a0">Patient ID</text><text x="500" y="180" text-anchor="end" fill="#15232C">HC-987654</text>
  <text x="306" y="206" fill="#8b97a0">Name</text><text x="500" y="206" text-anchor="end" fill="#15232C">Rajesh Kumar</text>
  <text x="306" y="232" fill="#8b97a0">Age / Gender</text><text x="500" y="232" text-anchor="end" fill="#15232C">52 / Male</text>
  <text x="306" y="258" fill="#8b97a0">Allergies</text><text x="500" y="258" text-anchor="end" fill="#15232C">Penicillin</text>
</g>
<!-- vitals -->
<rect x="528" y="146" width="150" height="150" rx="10" fill="#fff" stroke="#E2E9EC"/>
<text x="544" y="172" font-family="sans-serif" font-size="12" font-weight="600" fill="#15232C">Vitals (Latest)</text>
<g font-family="sans-serif" font-size="12"><text x="544" y="202" fill="#8b97a0">BP</text><text x="662" y="202" text-anchor="end" fill="#15232C">128/82</text>
<text x="544" y="228" fill="#8b97a0">HR</text><text x="662" y="228" text-anchor="end" fill="#15232C">78 bpm</text>
<text x="544" y="254" fill="#8b97a0">SpO₂</text><text x="662" y="254" text-anchor="end" fill="#15232C">98%</text>
<text x="544" y="280" fill="#8b97a0">Temp</text><text x="662" y="280" text-anchor="end" fill="#15232C">98.4 °F</text></g>
<!-- electrolytes -->
<rect x="690" y="146" width="150" height="150" rx="10" fill="#fff" stroke="#E2E9EC"/>
<text x="706" y="172" font-family="sans-serif" font-size="12" font-weight="600" fill="#15232C">Electrolytes</text>
<text x="824" y="172" text-anchor="end" font-family="sans-serif" font-size="10" fill="#0E8FA6">View trend</text>
<g font-family="sans-serif" font-size="12"><text x="706" y="200" fill="#8b97a0">Na⁺</text><text x="824" y="200" text-anchor="end" fill="#17A673">138</text>
<text x="706" y="224" fill="#8b97a0">K⁺</text><text x="824" y="224" text-anchor="end" fill="#17A673">4.2</text>
<text x="706" y="248" fill="#8b97a0">Cl⁻</text><text x="824" y="248" text-anchor="end" fill="#17A673">102</text>
<text x="706" y="272" fill="#8b97a0">Ca²⁺</text><text x="824" y="272" text-anchor="end" fill="#17A673">9.4</text></g>
<!-- encounters / labs / actions row -->
<rect x="226" y="312" width="290" height="120" rx="10" fill="#fff" stroke="#E2E9EC"/>
<text x="244" y="338" font-family="sans-serif" font-size="12" font-weight="600" fill="#15232C">Recent Encounters</text>
<g font-family="sans-serif" font-size="11" fill="#5C6B76">
  <text x="244" y="366">24-May  Follow up</text><text x="244" y="390">10-May  Fever</text><text x="244" y="414">02-May  Chest pain</text>
</g>
<rect x="528" y="312" width="312" height="120" rx="10" fill="#fff" stroke="#E2E9EC"/>
<text x="546" y="338" font-family="sans-serif" font-size="12" font-weight="600" fill="#15232C">Lab Results (Latest)</text>
<g font-family="sans-serif" font-size="11"><text x="546" y="366" fill="#5C6B76">HbA1c</text><text x="824" y="366" text-anchor="end" fill="#15232C">5.8 %</text>
<text x="546" y="390" fill="#5C6B76">CBC</text><text x="824" y="390" text-anchor="end" fill="#15232C">Normal</text>
<text x="546" y="414" fill="#5C6B76">CRP</text><text x="824" y="414" text-anchor="end" fill="#15232C">4.2 mg/L</text></g>
<!-- quick actions -->
<g>
  <rect x="226" y="448" width="148" height="72" rx="10" fill="#F6F9FA" stroke="#E2E9EC"/>
  <rect x="384" y="448" width="148" height="72" rx="10" fill="#F6F9FA" stroke="#E2E9EC"/>
  <rect x="542" y="448" width="148" height="72" rx="10" fill="#F6F9FA" stroke="#E2E9EC"/>
  <rect x="700" y="448" width="140" height="72" rx="10" fill="#F6F9FA" stroke="#E2E9EC"/>
  <g fill="#0E8FA6"><rect x="292" y="466" width="16" height="20" rx="2"/><rect x="450" y="466" width="16" height="20" rx="2"/></g>
  <circle cx="616" cy="476" r="9" fill="none" stroke="#0E8FA6" stroke-width="2"/><rect x="766" y="466" width="16" height="20" rx="2" fill="#0E8FA6"/>
  <g font-family="sans-serif" font-size="11" fill="#15232C" text-anchor="middle">
    <text x="300" y="508">New Encounter</text><text x="458" y="508">Prescription</text><text x="616" y="508">Order Lab</text><text x="770" y="508">Upload Doc</text>
  </g>
</g>
</svg>
