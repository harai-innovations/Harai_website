<text x="40" y="56" font-family="monospace" font-size="14" fill="#cfd5dc" letter-spacing="1">MRI BRAIN (CONTRAST)</text>
<text x="60" y="500" font-family="monospace" font-size="16" fill="#9aa2ab">R</text>
<!-- AI seg HUD -->
