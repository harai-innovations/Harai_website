  <radialGradient id="skull" cx="0.5" cy="0.42" r="0.62"><stop offset="0" stop-color="#6a6e76"/><stop offset="0.7" stop-color="#3c4047"/><stop offset="1" stop-color="#1d2026"/></radialGradient>
  <radialGradient id="brain" cx="0.5" cy="0.45" r="0.62"><stop offset="0" stop-color="#a6acb4"/><stop offset="0.78" stop-color="#6e747c"/><stop offset="1" stop-color="#474b52"/></radialGradient>
  <filter id="iglow"><feGaussianBlur stdDeviation="4"/></filter>
</defs>
<rect width="880" height="560" fill="url(#ibg)"/>
<g transform="translate(420 288)">
  <ellipse rx="218" ry="250" fill="url(#skull)"/>
  <ellipse rx="194" ry="224" fill="#06080b"/>
  <ellipse cy="6" rx="180" ry="208" fill="url(#brain)"/>
  <path d="M0 -196 V208" stroke="#2a2e35" stroke-width="3"/>
  <g fill="none" stroke="#41454d" stroke-width="3" opacity="0.7">
    <path d="M-148 -108 q40 -30 70 5 q30 30 -10 60"/><path d="M-118 32 q50 -10 60 40 q5 45 -55 50"/>
    <path d="M-88 130 q45 0 55 45"/><path d="M118 -118 q-40 -25 -65 10 q-25 32 12 58"/>
    <path d="M132 42 q-55 -5 -60 45 q0 42 55 48"/><path d="M92 134 q-40 5 -52 48"/>
    <path d="M-40 -148 q40 10 38 55"/><path d="M40 -148 q-40 10 -38 55"/>
  </g>
  <path d="M-22 -28 q-30 30 -10 70 q12 22 28 6 M22 -28 q30 30 10 70 q-12 22 -28 6" fill="#23272e" opacity="0.85"/>
